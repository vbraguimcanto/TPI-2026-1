services:
  db:
    image: mariadb:latest
    container_name: fastapi_mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD:  ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DB}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - api-network
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - api-network
  web:
    build: .
    container_name: fastapi_app
    restart: always
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    networks:
      - api-network

volumes:
  mariadb_data:
    

networks:
  api-network:
    driver: bridge
